name: CodeQL Analysis

permissions:
  contents: read
  pull-requests: write
  actions: read
  security-events: write

on: [pull_request]

jobs:
  codeql:
    uses: ministryofjustice/data-platform-github-actions/.github/workflows/codeql-analysis.yml@5a78fec83924b266564bef1a9803536a9bd68a1f #v4.0.7
    with:
      languages: '["python", "actions"]'
