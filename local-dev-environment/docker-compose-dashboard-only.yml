services:
  opensearch-dashboard-only:
    container_name: opensearch-dashboard-only
    image: opensearchproject/opensearch-dashboards:3.3.0 # Or the version you need
    mem_limit: 1g
    restart: unless-stopped
    extra_hosts:
      # Required on Linux so host.docker.internal resolves to the Docker host gateway
      - "host.docker.internal:host-gateway"
    volumes:
      - ./opensearch_dashboards.dev.yml:/usr/share/opensearch-dashboards/config/opensearch_dashboards.yml
    ports:
      - "5603:5601" # OpenSearch Dashboards UI
    environment:
      # These credentials apply to Dashboards connecting to LocalStack's OpenSearch
      # for port forwarding from host to environment instance [dev, uat, prod] use
      - OPENSEARCH_HOSTS=http://host.docker.internal:9300
      # OPENSEARCH_HOSTS=http://opensearch:9200 # Use service name for Localstack host
      # Dev OpenSearch doesn't require authentication - leave USERNAME/PASSWORD empty
      # - OPENSEARCH_USERNAME=admin # Default for LocalStack's OpenSearch
      # - OPENSEARCH_PASSWORD=really-secure-passwordAa!1
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    # Dashboards depends on LocalStack being up and its OpenSearch domain being ready
